    if (event.ctrlKey) {
        event.stopImmediatePropagation();
    }
   }, { capture: true, passive: true });
   </script>

   <script>

   Info = {

   width: 570,
   height: 370,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
