<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Modes</title>
   <script>
   (function () {
    const types = ["wheel", "mousewheel", "DOMMouseScroll"];
    function allowBrowserCtrlWheel(e) {
     if (e.ctrlKey) e.stopImmediatePropagation();
    }
    types.forEach(t => window.addEventListener(t, allowBrowserCtrlWheel, { capture: true }));
   })();
   </script>
   <script src="../../../site/swingjs/swingjs2.js"></script>
   <script>
   if (!self.SwingJS)alert('swingjs2.js was not found.')
   Info = {
   code: "TwoDOF.Prog3.Undamped.Undamped",
   main: null,
   core: "_evibjs",
   width: 660,
   height: 370,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
<body style="background-color: #FFFFFF;">
<p><img src="../heading.jpg" width="520" height="37" alt="Two Degree of Freedom"></p>
<h3>Simulation of undamped two degree of freedom vibration.</h3>
<p>This simulation shows the modal contributions to the
transient vibration of a two degree of freedom system.</p>
<p>
<script>
SwingJS.getApplet('UndampedApplet', Info)
</script>
</p>
