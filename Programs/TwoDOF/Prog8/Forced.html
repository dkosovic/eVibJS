<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Forced Vibration</title>
   <script>
   (function () {
    const types = ["wheel", "mousewheel", "DOMMouseScroll"];
    function allowBrowserCtrlWheel(e) {
     if (e.ctrlKey) e.stopImmediatePropagation();
    }
    types.forEach(t => window.addEventListener(t, allowBrowserCtrlWheel, { capture: true }));
   })();
   </script>
   <script src="../../../site/swingjs/swingjs2.js"></script>
   <script>
   if (!self.SwingJS)alert('swingjs2.js was not found.')
   Info = {
   code: "TwoDOF.Prog8.Forced.Forced",
   main: null,
   core: "_evibjs",
   width: 570,
   height: 370,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
<body style="background-color: #FFFFFF;">
<p><img src="../heading.jpg" width="520" height="37" alt="Two Degree of Freedom"></p>
<h3>Simulation of sinusoidal abutment vibration.</h3>
<p>This simulation is of the sinusoidal abutment vibration
of a two degree of freedom system.</p>
<p>
<script>
SwingJS.getApplet('ForcedApplet', Info)
</script>
</p>
</body>
</html>
