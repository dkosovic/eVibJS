<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Forced response</title>
   <script>
   (function () {
    const types = ["wheel", "mousewheel", "DOMMouseScroll"];
    function allowBrowserCtrlWheel(e) {
     if (e.ctrlKey) e.stopImmediatePropagation();
    }
    types.forEach(t => window.addEventListener(t, allowBrowserCtrlWheel, { capture: true }));
   })();
   </script>
   <script src="../../../site/swingjs/swingjs2.js"></script>
   <script>
   if (!self.SwingJS)alert('swingjs2.js was not found.')
   Info = {
   code: "Modal.Prog4.Eigen2DOF.Eigen2DOF",
   main: null,
   core: "_evibjs",
   width: 750,
   height: 430,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
<body style="background-color: #FFFFFF;">
<p><img src="../heading.jpg" width="520" height="37" alt="Modal Analysis"></p>
<h3>Forced response of a two degree of freedom system.</h3>
<p>This program compares the exact response with that
obtained by modal superposition using complex eigen
values.</p>
<p>
<script>
SwingJS.getApplet('Eigen2DOFApplet', Info)
</script>
</p>
</body>
</html>
