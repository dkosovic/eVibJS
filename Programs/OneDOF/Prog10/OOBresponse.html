<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Out-of-balance Response</title>
   <style>
   .gradient-strip {
      display: flex;
      align-items: center;
      height: 38px;
      padding: 0 10px;
      width: 700px;
      box-sizing: border-box;
      background: linear-gradient(to right, #2f9eab 0%, #ffffff 100%);
   }
   .gradient-strip h1 {
      margin: 0;
      color: white;
      font-family: "Times New Roman", Times, serif;
      font-size: 16px;
   }
   </style>
   <script>
   (function () {
    const types = ["wheel", "mousewheel", "DOMMouseScroll"];
    function allowBrowserCtrlWheel(e) {
     if (e.ctrlKey) e.stopImmediatePropagation();
    }
    types.forEach(t => window.addEventListener(t, allowBrowserCtrlWheel, { capture: true }));
   })();
   </script>
   <script src="../../../site/swingjs/swingjs2.js"></script>
   <script>
   if (!self.SwingJS)alert('swingjs2.js was not found.')
   Info = {
   code: "OneDOF.Prog10.OOBresponse",
   main: null,
   core: "_evibjs",
   width: 700,
   height: 400,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
<body style="background-color: #FFFFFF;">
<div class="gradient-strip">
  <h1>ONE DEGREE OF FREEDOM</h1>
</div>
<h3>Out-of-balance response of damped system.</h3>
<p>The graphs show the magnitude and phase of the
out-of-balance response of a one degree of freedom
system.</p>
<p>
<script>
SwingJS.getApplet('OOBresponseApplet', Info)
</script>
</p>
</body>
</html>
