<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Forced response</title>
   <script>
   (function () {
    const types = ["wheel", "mousewheel", "DOMMouseScroll"];
    function allowBrowserCtrlWheel(e) {
     if (e.ctrlKey) e.stopImmediatePropagation();
    }
    types.forEach(t => window.addEventListener(t, allowBrowserCtrlWheel, { capture: true }));
   })();
   </script>
   <script src="../../../site/swingjs/swingjs2.js"></script>
   <script>
   if (!self.SwingJS)alert('swingjs2.js was not found.')
   Info = {
   code: "MultiDOF.Prog4.Forcedresponse_2DOF.Forcedresponse_2DOF",
   main: null,
   core: "_evibjs",
   width: 780,
   height: 410,
   readyFunction: null,
   serverURL: null,
   j2sPath: '../../../site/swingjs/j2s',
   console: window.console,
   allowjavascript: true
   }
   </script>
</head>
<body style="background-color: #FFFFFF;">
<p><img src="../heading.jpg" width="520" height="37" alt="Multi Degree of Freedom"></p>
<h3>Forced Response.</h3>
<p>The graph shows the magnitude of the forced response of a
damped three degree of freedom system.</p>

SwingJS.getApplet('Forcedresponse2DOFApplet', Info)
</script>
</p>

</html>
